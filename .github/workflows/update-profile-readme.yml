name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  push:
    paths:
      - "README.md"
      - "scripts/update-profile-readme.mjs"
      - ".github/workflows/update-profile-readme.yml"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update dynamic repository sections
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: istrejo
          MAX_REPOS_PER_SECTION: 6
        run: node scripts/update-profile-readme.mjs

      - name: Commit changes
        run: |
          if [[ -n $(git status --porcelain README.md) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update profile repositories"
            git push
          else
            echo "README is already up to date."
          fi
